packages:
  - ./packages/*
  - ./apps/*
blockExoticSubdeps: true

catalogs:
  ai:
    '@anthropic-ai/sdk': ^0.71.0
    '@mcp-ui/server': ^6.0.0
    '@modelcontextprotocol/inspector': ^0.19.0
  opencode:
    '@opencode-ai/plugin': 1.17.9
    '@opentui/core': ^0.4.3
    '@opentui/keymap': ^0.4.3
    '@opentui/solid': ^0.4.3
    solid-js: 1.9.12
  lint:
    '@eslint/compat': ^2.0.0
    '@eslint/js': ^9.36.0
    '@typescript-eslint/parser': ^8.44.0
    '@typescript-eslint/types': ^8.44.0
    eslint: ^9.36.0
    eslint-config-prettier: ^10.0.1
    eslint-plugin-import: ^2.32.0
    eslint-plugin-pnpm: ^1.3.0
    eslint-plugin-svelte: ^3.19.0
    globals: ^17.0.0
    prettier: ^3.4.2
    prettier-plugin-svelte: ^3.3.3
    svelte-eslint-parser: ^1.7.1
    typescript-eslint: ^8.44.0
  svelte:
    '@sveltejs/adapter-vercel': ^6.0.0
    '@sveltejs/kit': ^2.42.2
    '@sveltejs/vite-plugin-svelte': ^6.0.0
    svelte: ^5.56.1
    svelte-check: ^4.0.0
  tmcp:
    '@tmcp/adapter-valibot': ^0.1.5
    '@tmcp/transport-http': ^0.8.5
    '@tmcp/transport-in-memory': ^0.0.6
    '@tmcp/transport-stdio': ^0.4.2
    tmcp: ^1.19.3
  tooling:
    '@changesets/cli': ^2.29.7
    '@svitejs/changesets-changelog-github-compact': ^1.2.0
    '@types/estree': ^1.0.8
    '@types/node': ^24.3.1
    '@valibot/to-json-schema': ^1.5.0
    '@vercel/analytics': ^2.0.0
    dotenv: ^17.2.3
    node-resolve-ts: ^1.0.2
    publint: ^0.3.13
    sade: 1.8.1
    ts-blank-space: ^0.7.0
    tsdown: ^0.20.0
    typescript: ^5.0.0
    valibot: ^1.2.0
    vite: ^7.0.4
    vite-plugin-devtools-json: ^1.0.0
    vitest: ^4.0.0
    zimmerframe: ^1.1.4
engineStrict: true
minimumReleaseAge: 2880
minimumReleaseAgeExclude:
  - '@sveltejs/*'
  - svelte
  - esrap
  - devalue
  - zimmerframe
  - prettier-plugin-svelte
  - svelte-check
  - esm-env

useNodeVersion: 22.22.2
